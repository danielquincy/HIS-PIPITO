<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cambiar contraseña — HIS-PIPITOS</title>
    <link rel="stylesheet" href="/css/tailwind-app.css" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body class="login-body">
    <div class="login-strip" aria-hidden="true"></div>
    <div class="login-layout">
      <aside class="login-aside">
        <div class="login-aside-inner">
          <img
            class="login-brand-logo"
            src="/img/logo-pipitos.png"
            alt="Los Pipitos — HIS-PIPITOS"
            width="240"
            height="120"
            decoding="async"
          />
          <h1 class="login-brand-title">HIS-PIPITOS</h1>
          <p class="login-brand-sub">Por seguridad, debe establecer una nueva contraseña antes de continuar.</p>
          <span class="login-brand-badge">Acceso seguro</span>
        </div>
      </aside>
      <main class="login-main">
        <div class="login-card-wrap">
          <div class="login-card">
            <div class="login-card-brand" aria-hidden="true">
              <img class="login-card-logo" src="/img/logo-pipitos.png" alt="" width="200" height="80" decoding="async" />
            </div>
            <h2 class="login-form-title">Nueva contraseña</h2>
            <p class="login-form-hint">Ingrese su contraseña actual y la nueva contraseña (mínimo 6 caracteres).</p>
            <div id="error" class="login-error" role="alert"></div>
            <form id="pwd-form" autocomplete="on">
              <div class="login-field">
                <label for="current">Contraseña actual</label>
                <input class="input" id="current" name="current" type="password" autocomplete="current-password" required />
              </div>
              <div class="login-field">
                <label for="next">Nueva contraseña</label>
                <input class="input" id="next" name="next" type="password" autocomplete="new-password" required minlength="6" />
              </div>
              <div class="login-field">
                <label for="next2">Confirmar nueva contraseña</label>
                <input class="input" id="next2" name="next2" type="password" autocomplete="new-password" required minlength="6" />
              </div>
              <button type="submit" class="btn btn-primary login-submit">Guardar y continuar</button>
            </form>
            <div class="login-footer">
              <a href="/login.html">Cerrar sesión e ir al inicio de sesión</a>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="/js/app.js"></script>
    <script>
      if (!HisAuth.getToken()) {
        window.location.href = "/login.html";
      }
      document.getElementById("pwd-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        var err = document.getElementById("error");
        err.textContent = "";
        err.classList.remove("is-visible");
        var c = document.getElementById("current").value;
        var n = document.getElementById("next").value;
        var n2 = document.getElementById("next2").value;
        if (n !== n2) {
          err.textContent = "Las contraseñas nuevas no coinciden";
          err.classList.add("is-visible");
          return;
        }
        try {
          var res = await apiFetch("/api/auth/change-password", {
            method: "POST",
            body: { currentPassword: c, newPassword: n },
          });
          if (!res.ok) {
            var body = await res.json().catch(function () {
              return {};
            });
            throw new Error(body.message || "No se pudo actualizar");
          }
          var meRes = await fetch("/api/auth/me", {
            headers: { Authorization: "Bearer " + HisAuth.getToken() },
          });
          var me = meRes.ok ? await meRes.json() : {};
          if (me.iamMaster) {
            window.location.href = "/launcher.html";
          } else {
            window.location.href = "/app/pages/inicio.html";
          }
        } catch (x) {
          err.textContent = x.message || "Error";
          err.classList.add("is-visible");
        }
      });
    </script>
  </body>
</html>
