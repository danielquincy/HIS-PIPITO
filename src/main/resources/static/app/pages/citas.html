<!DOCTYPE html>
<!--
  Plantilla: cada pantalla del HIS copia esta estructura (PAGEID, PAGETITLE).
-->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HIS-PIPITOS - Citas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="/css/shell.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ocean: {
                50: "#f0f9ff",
                100: "#e0f2fe",
                200: "#bae6fd",
                300: "#7dd3fc",
                400: "#38bdf8",
                500: "#0ea5e9",
                600: "#0284c7",
                700: "#0369a1",
                800: "#075985",
                900: "#0c4a6e",
                950: "#082f49",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden">
    <div id="app-root" class="flex w-full min-h-0 h-full"></div>
    <script src="/js/app.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/his-app.js"></script>
    <script>
      HisLayout.mount("citas", "Citas", document.getElementById("app-root"));
      HisApp.initPage("citas");
    </script>
  </body>
</html>
